<style>
* { box-sizing: border-box; }
body { margin: 0; background: #0b1014; color: #f2ecdf; font-family: -apple-system, "Segoe UI", Roboto, "Noto Sans Bengali", sans-serif; }
.header { position: sticky; top: 0; z-index: 20; background: rgba(11,16,20,0.92); border-bottom: 1px solid #2a342f; padding: 16px; }
.header h1 { font-size: 22px; margin: 0; font-family: Georgia, "Noto Serif Bengali", serif; }
.accent { color: #c9a14a; }
.subtitle { font-size: 13px; color: #9aa39a; margin: 6px 0 0; }
.search { margin-top: 12px; width: 100%; padding: 10px 14px; background: #141b1a; border: 1px solid #2a342f; border-radius: 8px; color: #f2ecdf; outline: none; font-size: 14px; }
.search::placeholder { color: #5f6b62; }
.main { max-width: 900px; margin: 0 auto; padding: 16px; }
.count { font-size: 12px; color: #5f6b62; margin-bottom: 10px; }
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
@media (min-width: 600px) { .grid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 800px) { .grid { grid-template-columns: repeat(4, 1fr); } }
.card { text-align: left; border-radius: 8px; border: 1px solid #2a342f; background: #121815; color: #f2ecdf; padding: 12px; font-size: 14px; cursor: pointer; }
.empty { text-align: center; color: #5f6b62; padding: 40px 0; grid-column: 1 / -1; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; padding: 12px; z-index: 30; }
.modal { background: #0f1513; border: 1px solid #2a342f; border-radius: 12px; max-width: 640px; width: 100%; max-height: 88vh; overflow-y: auto; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #2a342f; }
.modal-header h2 { margin: 0; font-size: 20px; }
.close-btn { background: none; border: none; color: #9aa39a; font-size: 26px; cursor: pointer; line-height: 1; padding: 0 6px; }
.modal-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.place { border-radius: 8px; overflow: hidden; border: 1px solid #2a342f; background: #0b1014; }
.place-img-wrap { height: 200px; }
.landmark-img { width: 100%; height: 100%; object-fit: cover; display: block; }
.landmark-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; text-align: center; padding: 0 12px; color: #fdf6e3; font-size: 14px; font-weight: 500; }
.place-name { padding: 8px 12px; color: #c9a14a; font-size: 13px; font-weight: 500; }
.footer { text-align: center; color: #5f6b62; font-size: 12px; padding: 24px 0; }
</style>

function placeholderColor(seed) {
  const colors = ["#1d4e4a", "#7a2e2e", "#2e3a6b", "#6b4f1d", "#3a5d2e", "#5d2e5d"];
  let h = 0;
  for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) % colors.length;
  return colors[Math.abs(h) % colors.length];
}

function render() {
  const root = document.getElementById("root");
  const query = (window.__query || "").trim().toLowerCase();
  const filtered = COUNTRIES.filter(function(c){ return !query || c[0].toLowerCase().indexOf(query) !== -1; });
  const selected = window.__selected;

  var html = ''
    + '<div class="header">'
    + '<h1>পৃথিবীর দেশ <span class="accent">· বিখ্যাত জায়গা</span></h1>'
    + '<p class="subtitle">দেশের নামে ক্লিক করো — সেই দেশের ৩টি বিখ্যাত ও সুন্দর জায়গার ছবি দেখাবে।</p>'
    + '<input class="search" id="searchBox" placeholder="দেশের নাম লিখে খুঁজুন…" value="' + query + '" />'
    + '</div>'
    + '<div class="main">'
    + '<p class="count">' + filtered.length + ' টি দেশ</p>'
    + '<div class="grid">';

  if (filtered.length === 0) {
    html += '<div class="empty">কোনো দেশ পাওয়া যায়নি।</div>';
  } else {
    filtered.forEach(function(c){
      const idx = COUNTRIES.indexOf(c);
      html += '<button class="card" onclick="openCountry(' + idx + ')">' + c[0] + '</button>';
    });
  }
  html += '</div></div><div class="footer">মোট ' + COUNTRIES.length + ' টি দেশ</div>';

  if (selected !== null && selected !== undefined) {
    const c = COUNTRIES[selected];
    html += '<div class="modal-overlay" onclick="closeModal(event)">'
      + '<div class="modal" onclick="event.stopPropagation()">'
      + '<div class="modal-header"><h2>' + c[0] + '</h2>'
      + '<button class="close-btn" onclick="closeModal()">×</button></div>'
      + '<div class="modal-body">'
      + c[1].map(function(place){
          const safeId = "img-" + place.replace(/[^a-zA-Z0-9]/g,'');
          return '<div class="place"><div class="place-img-wrap" id="' + safeId + '">'
            + '<div class="landmark-placeholder" style="background:' + placeholderColor(place) + '">লোড হচ্ছে…</div>'
            + '</div><div class="place-name">' + place + '</div></div>';
        }).join("")
      + '</div></div></div>';
  }

  root.innerHTML = html;

  const sb = document.getElementById("searchBox");
  if (sb) {
    sb.addEventListener("input", function(e) {
      window.__query = e.target.value;
      render();
      const newSb = document.getElementById("searchBox");
      if (newSb) {
        newSb.focus();
        newSb.setSelectionRange(newSb.value.length, newSb.value.length);
      }
    });
  }

  if (selected !== null && selected !== undefined) {
    const c2 = COUNTRIES[selected];
    c2[1].forEach(function(place){
      const containerId = "img-" + place.replace(/[^a-zA-Z0-9]/g,'');
      fetch("https://en.wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(place.replace(/ /g, "_")))
        .then(function(r){ return r.ok ? r.json() : Promise.reject(); })
        .then(function(data){
          const url = (data.thumbnail && data.thumbnail.source) || (data.originalimage && data.originalimage.source);
          const el = document.getElementById(containerId);
          if (url && el) {
            el.innerHTML = '<img class="landmark-img" src="' + url + '" alt="' + place + '" loading="lazy" />';
          } else if (el) {
            el.innerHTML = '<div class="landmark-placeholder" style="background:' + placeholderColor(place) + '">' + place + '</div>';
          }
        })
        .catch(function(){
          const el = document.getElementById(containerId);
          if (el) el.innerHTML = '<div class="landmark-placeholder" style="background:' + placeholderColor(place) + '">' + place + '</div>';
        });
    });
  }
}

function openCountry(idx) {
  window.__selected = idx;
  render();
}
function closeModal(e) {
  window.__selected = null;
  render();
}

window.__query = "";
window.__selected = null;
render();
</script>
